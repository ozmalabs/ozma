[workspace]
resolver = "2"
members = [
    "ozma-node",
    "ozma-softnode",
    "ozma-agent",
    "ozma-drivers",
    "ozma-proto",
    "ozma-mesh",
    "ozma-crypto",
    "ozma-pipewire",
]

[profile.release]
opt-level     = 3
lto           = "thin"
codegen-units = 1
strip         = "symbols"

[workspace.dependencies]
sd-notify          = { version = "0.4" }
tokio              = { version = "1", features = ["full"] }
serde              = { version = "1", features = ["derive"] }
serde_json         = "1"
tracing            = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
anyhow             = "1"
thiserror          = "1"
bytes              = "1"
async-trait        = "0.1"
libc               = "0.2"
uuid               = { version = "1", features = ["v4"] }
# HTTP server (used by ozma-node HLS server)
axum               = { version = "0.7", features = ["tokio"] }
tower-http         = { version = "0.5", features = ["fs", "cors"] }
tower              = { version = "0.4" }
# HTTP client (used by ozma-node registration + heartbeat)
reqwest            = { version = "0.12", features = ["json"] }
# CLI
clap               = { version = "4", features = ["derive"] }
# mDNS
mdns-sd            = "0.11"
# Networking helpers
hostname           = "0.4"
# Shared state
arc-swap           = "1"
# PipeWire
pipewire           = "0.9.2"
