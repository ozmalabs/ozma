<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>

    <!-- Left curtain: dark outer → bright emerald inner -->
    <linearGradient id="lgL" x1="0" y1="0" x2="82" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0e2419"/>
      <stop offset="55%"  stop-color="#1c6043"/>
      <stop offset="100%" stop-color="#35b87e"/>
    </linearGradient>

    <!-- Right curtain: bright inner → dark outer -->
    <linearGradient id="lgR" x1="118" y1="0" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#35b87e"/>
      <stop offset="45%"  stop-color="#1c6043"/>
      <stop offset="100%" stop-color="#0e2419"/>
    </linearGradient>

    <!-- Top-lit shine overlay -->
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="30%"  stop-color="rgba(255,255,255,0.03)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.16)"/>
    </linearGradient>

    <!-- Blurred inner-edge glow -->
    <filter id="edgeGlow" x="-200%" y="-5%" width="500%" height="110%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4"/>
    </filter>

    <!-- Text drop shadow -->
    <filter id="textShadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#000" flood-opacity="0.8"/>
    </filter>

  </defs>

  <!-- ── Background ── -->
  <rect width="200" height="200" fill="#050505" rx="28"/>

  <!-- ════════ LEFT CURTAIN ════════ -->
  <!-- Main body -->
  <path d="M 0,8 L 82,8
           C 82,42 62,72 52,100
           C 42,128 58,162 68,192
           L 0,192 Z"
        fill="url(#lgL)"/>

  <!-- Shine -->
  <path d="M 0,8 L 82,8
           C 82,42 62,72 52,100
           C 42,128 58,162 68,192
           L 0,192 Z"
        fill="url(#shine)"/>

  <!-- Fold 1 — outer -->
  <path d="M 18,8 C 17,62 16,122 19,188 L 24,188 C 21,122 22,62 23,8 Z"
        fill="rgba(255,255,255,0.08)"/>

  <!-- Fold 2 — mid -->
  <path d="M 44,8 C 42,52 39,92 38,118 C 37,144 40,168 42,188 L 47,188 C 45,168 42,144 43,118 C 44,92 47,52 49,8 Z"
        fill="rgba(255,255,255,0.06)"/>

  <!-- Fold 3 — near inner edge, follows S-curve -->
  <path d="M 72,8
           C 71,42 61,72 57,100
           C 53,128 57,162 63,192
           L 67,192
           C 61,162 57,128 61,100
           C 65,72 75,42 76,8 Z"
        fill="rgba(255,255,255,0.04)"/>

  <!-- Inner edge glow (blurred halo) -->
  <path d="M 82,8
           C 82,42 62,72 52,100
           C 42,128 58,162 68,192
           L 74,192
           C 64,162 48,128 58,100
           C 68,72 88,42 88,8 Z"
        fill="#4ae0a4" filter="url(#edgeGlow)" opacity="0.7"/>

  <!-- Inner edge sharp highlight -->
  <path d="M 82,8
           C 82,42 62,72 52,100
           C 42,128 58,162 68,192
           L 71,192
           C 61,162 45,128 55,100
           C 65,72 85,42 85,8 Z"
        fill="#4ae0a4" opacity="0.55"/>


  <!-- ════════ RIGHT CURTAIN ════════ -->
  <!-- Main body -->
  <path d="M 200,8 L 118,8
           C 118,42 138,72 148,100
           C 158,128 142,162 132,192
           L 200,192 Z"
        fill="url(#lgR)"/>

  <!-- Shine -->
  <path d="M 200,8 L 118,8
           C 118,42 138,72 148,100
           C 158,128 142,162 132,192
           L 200,192 Z"
        fill="url(#shine)"/>

  <!-- Fold 1 -->
  <path d="M 182,8 C 183,62 184,122 181,188 L 176,188 C 179,122 178,62 177,8 Z"
        fill="rgba(255,255,255,0.08)"/>

  <!-- Fold 2 -->
  <path d="M 156,8 C 158,52 161,92 162,118 C 163,144 160,168 158,188 L 153,188 C 155,168 158,144 157,118 C 156,92 153,52 151,8 Z"
        fill="rgba(255,255,255,0.06)"/>

  <!-- Fold 3 -->
  <path d="M 128,8
           C 129,42 139,72 143,100
           C 147,128 143,162 137,192
           L 133,192
           C 139,162 143,128 139,100
           C 135,72 125,42 124,8 Z"
        fill="rgba(255,255,255,0.04)"/>

  <!-- Inner edge glow -->
  <path d="M 118,8
           C 118,42 138,72 148,100
           C 158,128 142,162 132,192
           L 126,192
           C 136,162 152,128 142,100
           C 132,72 112,42 112,8 Z"
        fill="#4ae0a4" filter="url(#edgeGlow)" opacity="0.7"/>

  <!-- Inner edge sharp highlight -->
  <path d="M 118,8
           C 118,42 138,72 148,100
           C 158,128 142,162 132,192
           L 129,192
           C 139,162 155,128 145,100
           C 135,72 115,42 115,8 Z"
        fill="#4ae0a4" opacity="0.55"/>


  <!-- ════════ CURTAIN ROD ════════ -->
  <rect x="0" y="0" width="200" height="8" rx="4" fill="#1c6043" opacity="0.9"/>
  <rect x="0" y="0" width="200" height="3" rx="1.5" fill="#4ae0a4" opacity="0.45"/>

  <!-- Left finial -->
  <circle cx="10" cy="4" r="10"  fill="#0e2419"/>
  <circle cx="10" cy="4" r="7"   fill="#1c6043"/>
  <circle cx="10" cy="4" r="4.5" fill="#4ae0a4" opacity="0.9"/>
  <circle cx="10" cy="4" r="2"   fill="#6ef5bc"/>

  <!-- Right finial -->
  <circle cx="190" cy="4" r="10"  fill="#0e2419"/>
  <circle cx="190" cy="4" r="7"   fill="#1c6043"/>
  <circle cx="190" cy="4" r="4.5" fill="#4ae0a4" opacity="0.9"/>
  <circle cx="190" cy="4" r="2"   fill="#6ef5bc"/>


  <!-- ════════ MONOGRAM ════════ -->
  <!-- Soft dark vignette so text reads over bright curtain areas -->
  <ellipse cx="100" cy="105" rx="64" ry="56" fill="rgba(5,5,5,0.5)"/>

  <!-- "oz" — large primary mark -->
  <text x="100" y="122"
        text-anchor="middle"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-weight="800"
        font-size="72"
        letter-spacing="-4"
        filter="url(#textShadow)"
        fill="#f0fdf6">oz</text>

  <!-- "labs" — small secondary label -->
  <text x="100" y="155"
        text-anchor="middle"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-weight="700"
        font-size="18"
        letter-spacing="4"
        fill="#4ae0a4"
        opacity="0.85">LABS</text>

</svg>
