# 51-ozma.conf — WirePlumber configuration for Ozma audio routing.
#
# Install: copy to ~/.config/wireplumber/wireplumber.conf.d/
#          (or /etc/wireplumber/wireplumber.conf.d/ for system-wide)
#          then systemctl --user restart wireplumber
#
# This loads the ozma-routing.lua script which watches the "ozma" PipeWire
# metadata namespace and manages audio links for the active scenario.

wireplumber.components = [
  {
    name    = "ozma-routing.lua"
    type    = "script/lua"
    provides = "custom.ozma-audio-routing"
  }
]
