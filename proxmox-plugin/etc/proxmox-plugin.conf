# Ozma Proxmox Plugin Configuration
#
# controller_url: URL of the ozma controller
# Default: auto-discover via mDNS, or http://localhost:7380
controller_url = http://localhost:7380

# shm_size_mb: Default shared memory size per VM (MB)
# Larger = more frames buffered, higher resolution support
# 32MB = 1080p, 64MB = 1440p, 128MB = 4K
shm_size_mb = 64

# display_fps: Target frame rate for display capture
display_fps = 30

# audio_channels: Default audio channel count (2=stereo, 6=5.1, 8=7.1)
audio_channels = 2

# auto_register: Automatically register VMs with the controller
auto_register = true
