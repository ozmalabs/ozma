name: ozma-agent-ui

on:
  push:
    paths:
      - 'ozma-agent-ui/**'
      - 'ozma-agent/src/approvals.rs'
      - 'ozma-agent/src/api.rs'
      - '.github/workflows/agent-ui.yml'
  pull_request:
    paths: ['ozma-agent-ui/**']

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: ozma-agent-ui-linux-x86_64.tar.gz
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            artifact: ozma-agent-ui-windows-x86_64.zip
          - os: macos-14           # Apple Silicon runner
            target: aarch64-apple-darwin
            artifact: ozma-agent-ui-macos-aarch64.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-agent-ui-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libdbus-1-dev libssl-dev pkg-config

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p ozma-agent-ui

      - name: Test
        run: cargo test --target ${{ matrix.target }} -p ozma-agent-ui --features headless
        # Note: tray tests require display; headless tests only
        env:
          RUST_TEST_THREADS: 1

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist/ozma-agent-ui
          cp target/${{ matrix.target }}/release/ozma-agent-ui dist/ozma-agent-ui/
          tar -czf ${{ matrix.artifact }} -C dist ozma-agent-ui/

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force -Path dist/ozma-agent-ui
          Copy-Item target/${{ matrix.target }}/release/ozma-agent-ui.exe dist/ozma-agent-ui/
          Compress-Archive -Path dist/ozma-agent-ui/* -DestinationPath ${{ matrix.artifact }}

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist/ozma-agent-ui
          cp target/${{ matrix.target }}/release/ozma-agent-ui dist/ozma-agent-ui/
          tar -czf ${{ matrix.artifact }} -C dist ozma-agent-ui/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 7
