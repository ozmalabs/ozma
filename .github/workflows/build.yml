name: Build & Publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  # ── Python wheels ───────────────────────────────────────────────────────
  wheels:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [controller, softnode, agent]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - uses: astral-sh/setup-uv@v4
      - run: uv pip install --system build
      - name: Build wheel
        run: python -m build ${{ matrix.package }}/ --outdir dist/
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.package }}
          path: dist/*.whl

  # ── Container image ─────────────────────────────────────────────────────
  container:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/ozmalabs/ozma-controller:latest
            ghcr.io/ozmalabs/ozma-controller:${{ github.ref_name }}

  # ── Windows agent (.exe) ────────────────────────────────────────────────
  windows-agent:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - uses: astral-sh/setup-uv@v4
      - run: uv pip install --system pyinstaller aiohttp zeroconf Pillow pystray pynacl
      - name: Build exe
        run: |
          cd agent
          pyinstaller --onefile --name ozma-agent --console cli.py --noconfirm
      - uses: actions/upload-artifact@v4
        with:
          name: ozma-agent-windows
          path: agent/dist/ozma-agent.exe

  # ── Debian packages ─────────────────────────────────────────────────────
  deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y dpkg-dev debhelper dh-python
      - name: Build proxmox plugin .deb
        run: |
          cd proxmox-plugin
          dpkg-buildpackage -us -uc -b || true
      - uses: actions/upload-artifact@v4
        with:
          name: deb-packages
          path: "*.deb"
        if: always()

  # ── Publish to PyPI ─────────────────────────────────────────────────────
  publish-pypi:
    needs: [wheels]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          merge-multiple: true
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  # ── OTA image signing ───────────────────────────────────────────────────
  sign-ota:
    needs: [wheels]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - uses: astral-sh/setup-uv@v4
      - run: uv pip install --system pynacl
      - uses: actions/download-artifact@v4
        with:
          pattern: wheel-controller
          merge-multiple: true
          path: /tmp/ota-artifacts/
      - name: Sign OTA artifacts
        env:
          OTA_SIGNING_KEY: ${{ secrets.OTA_SIGNING_KEY }}
        run: |
          python - <<'EOF'
          import base64, os, sys
          from pathlib import Path
          sys.path.insert(0, "controller")
          from transport import IdentityKeyPair

          priv_b64 = os.environ.get("OTA_SIGNING_KEY", "")
          if not priv_b64:
              print("WARNING: OTA_SIGNING_KEY not set — skipping signing")
              sys.exit(0)
          priv_bytes = base64.b64decode(priv_b64.strip())
          kp = IdentityKeyPair.from_private_bytes(priv_bytes)

          for artifact in Path("/tmp/ota-artifacts").iterdir():
              if artifact.suffix in (".whl", ".img", ".tar", ".gz"):
                  data = artifact.read_bytes()
                  sig = kp.sign(data)
                  sig_path = artifact.with_suffix(artifact.suffix + ".sig")
                  sig_path.write_bytes(sig)
                  print(f"Signed {artifact.name} → {sig_path.name}")
          EOF
      - uses: actions/upload-artifact@v4
        with:
          name: ota-artifacts-signed
          path: /tmp/ota-artifacts/

  # ── GitHub Release ──────────────────────────────────────────────────────
  release:
    needs: [wheels, container, windows-agent, deb, sign-ota]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/ozma-agent-windows/ozma-agent.exe
            artifacts/wheel-*/*.whl
            artifacts/deb-packages/*.deb
            artifacts/ota-artifacts-signed/*.sig
          generate_release_notes: true
