# OzmaOS — Frigate NVR + MQTT broker
#
# Hardware detection:
#   - Hailo-8L (Raspberry Pi AI module): auto-detected
#   - NVIDIA GPU: auto-detected
#   - CPU fallback: auto-configured
#
# Integrates with Ozma controller — cameras auto-register as nodes
# with machine_class="camera" via mDNS discovery.

services:
  frigate:
    image: ghcr.io/blakeblackshear/frigate:stable
    container_name: ozma-frigate
    restart: unless-stopped
    privileged: true  # required for device access
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ozma-frigate-config:/config
      - ozma-frigate-media:/media/frigate
      - type: tmpfs
        target: /tmp/cache
        tmpfs:
          size: 1000000000
    ports:
      - "5000:5000"   # Frigate web UI
      - "8554:8554"   # RTSP restream
      - "8555:8555/tcp"  # WebRTC
    environment:
      FRIGATE_RTSP_PASSWORD: ${FRIGATE_RTSP_PASSWORD:-changeme}
    # Hardware acceleration — Hailo-8L (Raspberry Pi)
    devices:
      - /dev/hailo0:/dev/hailo0
    # Hardware acceleration — NVIDIA GPU
    # Uncomment if NVIDIA GPU is available:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    env_file:
      - ./env.template

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: ozma-mosquitto
    restart: unless-stopped
    volumes:
      - ozma-mosquitto-data:/mosquitto/data
      - ozma-mosquitto-log:/mosquitto/log
    ports:
      - "1883:1883"   # MQTT
      - "9001:9001"   # WebSocket
    command: mosquitto -c /mosquitto-no-auth.conf

volumes:
  ozma-frigate-config:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/frigate/config
  ozma-frigate-media:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/frigate/media
  ozma-mosquitto-data:
  ozma-mosquitto-log:
