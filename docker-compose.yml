# OzmaOS — Frigate NVR + MQTT Broker
version: "3.8"

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: ozmaos-frigate-mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mqtt-data:/mosquitto/data
      - mqtt-logs:/mosquitto/log
    environment:
      - TZ=${TZ:-UTC}

  frigate:
    image: ghcr.io/blakeblackshear/frigate:stable
    container_name: ozmaos-frigate
    restart: unless-stopped
    privileged: true
    ports:
      - "5000:5000"
      - "8554:8554"
      - "8555:8555/tcp"
      - "8555:8555/udp"
    volumes:
      - ./config:/config
      - ./media:/media/frigate
      - /etc/localtime:/etc/localtime:ro
      - type: tmpfs
        target: /tmp/cache
        tmpfs:
          size: 1000000000
    environment:
      - FRIGATE_RTSP_PASSWORD=${FRIGATE_RTSP_PASSWORD:-frigate}
      - TZ=${TZ:-UTC}
    # Auto-detect Hailo-8L or GPU inference
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      - mosquitto

volumes:
  mqtt-data:
  mqtt-logs:
