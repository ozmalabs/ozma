[package]
name        = "ozma-node"
version     = "0.1.0"
edition     = "2021"
description = "Ozma hardware node: V4L2 capture → ffmpeg HLS pipeline"

[lib]
name = "ozma_node"
path = "src/lib.rs"

[[bin]]
name = "ozma-node"
path = "src/main.rs"

[dependencies]
tokio              = { workspace = true }
serde              = { workspace = true }
serde_json         = { workspace = true }
tracing            = { workspace = true }
tracing-subscriber = { workspace = true }
anyhow             = { workspace = true }
thiserror          = { workspace = true }
axum               = { workspace = true }
tower-http         = { workspace = true }
notify             = { workspace = true }
v4l                = { workspace = true }
ffmpeg-sidecar     = { workspace = true }
ozma-proto         = { path = "../ozma-proto" }
ozma-mesh          = { path = "../ozma-mesh" }
ozma-crypto        = { path = "../ozma-crypto" }

[dev-dependencies]
tempfile  = "3"
tokio     = { workspace = true }
