[package]
name        = "ozma-node"
version     = "0.1.0"
edition     = "2021"
description = "Ozma hardware KVM node — mDNS advertisement and controller registration"

[[bin]]
name = "ozma-node"
path = "src/main.rs"

[dependencies]
# CLI
clap = { version = "4", features = ["derive"] }

# Async runtime
tokio = { version = "1", features = ["full"] }

# HTTP client (registration + heartbeat)
reqwest = { version = "0.12", features = ["json"] }

# mDNS advertisement
libmdns = "0.9"

# Serialisation
serde       = { version = "1", features = ["derive"] }
serde_json  = "1"

# Logging
tracing            = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Networking helpers
local-ip-address = "0.6"
hostname         = "0.4"
